random_seed = 1

[[phases]]
type = "construction_heuristic"
construction_heuristic_type = "first_fit"
construction_obligation = "assign_when_candidate_exists"
group_name = "shift_nurse_assignment"
value_candidate_limit = 32
group_candidate_limit = 64

[[phases]]
type = "vnd"

[[phases.neighborhoods]]
type = "grouped_scalar_move_selector"
group_name = "shift_nurse_assignment"
value_candidate_limit = 24
max_moves_per_step = 128
require_hard_improvement = true

[[phases.neighborhoods]]
type = "nearby_change_move_selector"
entity_class = "NrpShift"
variable_name = "nurse_idx"
max_nearby = 16
value_candidate_limit = 16

[[phases.neighborhoods]]
type = "nearby_swap_move_selector"
entity_class = "NrpShift"
variable_name = "nurse_idx"
max_nearby = 16

[[phases]]
type = "local_search"

[phases.acceptor]
type = "simulated_annealing"
hard_regression_policy = "never_accept_hard_regression"

[phases.acceptor.calibration]
sample_size = 64
target_acceptance_probability = 0.75
fallback_temperature = 2.0

[phases.forager]
type = "accepted_count"
limit = 4

[phases.move_selector]
type = "union_move_selector"
selection_order = "round_robin"

[[phases.move_selector.selectors]]
type = "grouped_scalar_move_selector"
group_name = "shift_nurse_assignment"
value_candidate_limit = 24
max_moves_per_step = 128
require_hard_improvement = true

[[phases.move_selector.selectors]]
type = "nearby_change_move_selector"
entity_class = "NrpShift"
variable_name = "nurse_idx"
max_nearby = 16
value_candidate_limit = 16

[[phases.move_selector.selectors]]
type = "nearby_swap_move_selector"
entity_class = "NrpShift"
variable_name = "nurse_idx"
max_nearby = 16
