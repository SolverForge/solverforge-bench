random_seed = 1

[[phases]]
type = "construction_heuristic"
construction_heuristic_type = "list_regret_insertion"
entity_class = "MachineSequence"
variable_name = "operations"

[[phases]]
type = "local_search"

[phases.acceptor]
type = "late_acceptance"
late_acceptance_size = 200

[phases.forager]
type = "accepted_count"
