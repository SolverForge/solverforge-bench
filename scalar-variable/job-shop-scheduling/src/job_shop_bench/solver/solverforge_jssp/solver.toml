[[phases.move_selector.selectors]]
type = "list_change_move_selector"
entity_class = "MachineSequence"
variable_name = "operations"

[[phases.move_selector.selectors]]
type = "list_swap_move_selector"
entity_class = "MachineSequence"
variable_name = "operations"

[[phases.move_selector.selectors]]
type = "sublist_change_move_selector"
