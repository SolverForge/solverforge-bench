repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-merge-conflict
    -   id: check-added-large-files

-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
    -   id: gitleaks
-   repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
    -   id: black

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix]
-   repo: local
    hooks:
    -   id: cargo-fmt-cvrp-solverforge
        name: cargo fmt (CVRP SolverForge crate)
        entry: cargo fmt --manifest-path list-variable/cvrp/src/cvrp_bench/solver/solverforge/Cargo.toml -- --check
        language: system
        pass_filenames: false
        files: ^list-variable/cvrp/src/cvrp_bench/solver/solverforge/.*\.rs$
    -   id: cargo-fmt-employee-scheduling-solverforge
        name: cargo fmt (employee scheduling SolverForge crate)
        entry: cargo fmt --manifest-path scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp/Cargo.toml -- --check
        language: system
        pass_filenames: false
        files: ^scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp/.*\.rs$
    -   id: cargo-clippy-cvrp-solverforge
        name: cargo clippy (CVRP SolverForge crate)
        entry: cargo clippy --manifest-path list-variable/cvrp/src/cvrp_bench/solver/solverforge/Cargo.toml --locked --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: ^list-variable/cvrp/src/cvrp_bench/solver/solverforge/.*\.rs$
    -   id: cargo-clippy-employee-scheduling-solverforge
        name: cargo clippy (employee scheduling SolverForge crate)
        entry: cargo clippy --manifest-path scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp/Cargo.toml --locked --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: ^scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp/.*\.rs$
