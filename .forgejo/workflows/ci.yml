name: CI

on:
  push:
    branches: [main, dev, release/*, feature/*]
  pull_request:
    branches: [main, dev, release/*]
  workflow_dispatch:

concurrency:
  group: ci-${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BENCH_PYTHONPATH: src:list-variable/cvrp/src:scalar-variable/employee-scheduling/src:scalar-variable/job-shop-scheduling/src

jobs:
  python:
    name: Forgejo Python Harness
    runs-on: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python 3.14
        id: python
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          "$HOME/.local/bin/uv" python install 3.14
          python_path="$("$HOME/.local/bin/uv" python find 3.14)"
          echo "python-path=${python_path}" >> "$GITHUB_OUTPUT"
          dirname "${python_path}" >> "$GITHUB_PATH"
          "${python_path}" --version

      - name: Install Python dependencies
        run: make install-python-deps HOST_PYTHON="${{ steps.python.outputs.python-path }}"

      - name: Check Python syntax
        run: .venv/bin/python3 -m compileall -q src list-variable/cvrp/src scalar-variable/employee-scheduling/src scalar-variable/job-shop-scheduling/src scripts

      - name: Validate TOML configuration examples
        run: |
          .venv/bin/python3 - <<'PY'
          import pathlib
          import tomllib

          for path in pathlib.Path(".").glob("benchmark*.toml"):
              with path.open("rb") as handle:
                  tomllib.load(handle)
              print(f"valid TOML: {path}")
          PY

      - name: Verify fair-start witness contract
        run: make verify-fair-start

      - name: Validate CVRP bundled instances
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-cvrp

      - name: Validate employee-scheduling model parity
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-employee-model-parity

  rust:
    name: Forgejo Rust Adapters
    runs-on: rust

    strategy:
      fail-fast: false
      matrix:
        crate:
          - list-variable/cvrp/src/cvrp_bench/solver/solverforge
          - list-variable/cvrp/src/cvrp_bench/solver/rustvrp
          - scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp
          - scalar-variable/job-shop-scheduling/src/job_shop_bench/solver/solverforge_jssp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout SolverForge path dependencies
        run: |
          rm -rf "$GITHUB_WORKSPACE/../solverforge"
          git clone --depth 1 --branch main "${GITHUB_SERVER_URL:-http://vigilance:3002}/SolverForge/solverforge.git" "$GITHUB_WORKSPACE/../solverforge"

      - name: Install Python 3.14
        id: python
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          "$HOME/.local/bin/uv" python install 3.14
          python_path="$("$HOME/.local/bin/uv" python find 3.14)"
          echo "python-path=${python_path}" >> "$GITHUB_OUTPUT"
          dirname "${python_path}" >> "$GITHUB_PATH"
          "${python_path}" --version

      - name: Set Python environment variables
        run: |
          echo "PYO3_PYTHON=${{ steps.python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "PYTHON_SYS_EXECUTABLE=${{ steps.python.outputs.python-path }}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        working-directory: ${{ matrix.crate }}
        run: cargo build --locked
