name: CI

on:
  push:
    branches: [main, dev, release/*, feature/*]
  pull_request:
    branches: [main, dev, release/*]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BENCH_PYTHONPATH: src:list-variable/cvrp/src:scalar-variable/employee-scheduling/src:scalar-variable/job-shop-scheduling/src

jobs:
  python-github:
    name: GitHub Python Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install-python-deps HOST_PYTHON="${{ steps.setup-python.outputs.python-path }}"

      - name: Check Python syntax
        run: python -m compileall -q src list-variable/cvrp/src scalar-variable/employee-scheduling/src scalar-variable/job-shop-scheduling/src scripts

      - name: Validate TOML configuration examples
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          for path in pathlib.Path(".").glob("benchmark*.toml"):
              with path.open("rb") as handle:
                  tomllib.load(handle)
              print(f"valid TOML: {path}")
          PY

      - name: Verify SolverForge configuration parity
        run: make verify-solverforge-config-parity

      - name: Verify SolverForge Python guardrail contract
        run: make verify-solverforge-py-guardrail-contract

      - name: Verify fair-start witness contract
        run: make verify-fair-start

      - name: Validate CVRP bundled instances
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-cvrp

      - name: Validate employee-scheduling model parity
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-employee-model-parity

  rust-github:
    name: GitHub Rust Adapters
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        crate:
          - list-variable/cvrp/src/cvrp_bench/solver/solverforge
          - list-variable/cvrp/src/cvrp_bench/solver/rustvrp
          - scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp
          - scalar-variable/job-shop-scheduling/src/job_shop_bench/solver/solverforge_jssp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.14"

      - name: Set Python environment variables
        run: |
          echo "PYO3_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "PYTHON_SYS_EXECUTABLE=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: Check formatting
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        working-directory: ${{ matrix.crate }}
        run: cargo build --locked
