name: CI

on:
  push:
    branches: [main, dev, release/*, feature/*]
  pull_request:
    branches: [main, dev, release/*]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BENCH_PYTHONPATH: src:list-variable/cvrp/src:scalar-variable/employee-scheduling/src

jobs:
  python-github:
    if: ${{ github.server_url == 'https://github.com' }}
    name: GitHub Python Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install-python-deps HOST_PYTHON="${{ steps.setup-python.outputs.python-path }}"

      - name: Check Python syntax
        run: python -m compileall -q src list-variable/cvrp/src scalar-variable/employee-scheduling/src scripts

      - name: Validate TOML configuration examples
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          for path in pathlib.Path(".").glob("benchmark*.toml"):
              with path.open("rb") as handle:
                  tomllib.load(handle)
              print(f"valid TOML: {path}")
          PY

      - name: Validate CVRP bundled instances
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-cvrp

      - name: Validate employee-scheduling model parity
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-employee-model-parity

  python-forgejo:
    if: ${{ github.server_url != 'https://github.com' }}
    name: Forgejo Python Harness
    runs-on: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install-python-deps HOST_PYTHON="${{ steps.setup-python.outputs.python-path }}"

      - name: Check Python syntax
        run: python -m compileall -q src list-variable/cvrp/src scalar-variable/employee-scheduling/src scripts

      - name: Validate TOML configuration examples
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          for path in pathlib.Path(".").glob("benchmark*.toml"):
              with path.open("rb") as handle:
                  tomllib.load(handle)
              print(f"valid TOML: {path}")
          PY

      - name: Validate CVRP bundled instances
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-cvrp

      - name: Validate employee-scheduling model parity
        env:
          PYTHONPATH: ${{ env.BENCH_PYTHONPATH }}
        run: make validate-employee-model-parity

  rust-github:
    if: ${{ github.server_url == 'https://github.com' }}
    name: GitHub Rust Adapters
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        crate:
          - list-variable/cvrp/src/cvrp_bench/solver/solverforge
          - list-variable/cvrp/src/cvrp_bench/solver/rustvrp
          - scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout SolverForge path dependencies
        run: |
          rm -rf "$GITHUB_WORKSPACE/../solverforge"
          rm -rf "$GITHUB_WORKSPACE/../solverforge-node-sharing"
          git clone --depth 1 --branch v0.14.1 "${GITHUB_SERVER_URL:-https://github.com}/SolverForge/solverforge.git" "$GITHUB_WORKSPACE/../solverforge"
          git clone --depth 1 --branch feat/node-sharing-compiler "${GITHUB_SERVER_URL:-https://github.com}/SolverForge/solverforge.git" "$GITHUB_WORKSPACE/../solverforge-node-sharing"

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.14"

      - name: Set Python environment variables
        run: |
          echo "PYO3_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "PYTHON_SYS_EXECUTABLE=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: Check formatting
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        working-directory: ${{ matrix.crate }}
        run: cargo build --locked

  rust-forgejo:
    if: ${{ github.server_url != 'https://github.com' }}
    name: Forgejo Rust Adapters
    runs-on: rust

    strategy:
      fail-fast: false
      matrix:
        crate:
          - list-variable/cvrp/src/cvrp_bench/solver/solverforge
          - list-variable/cvrp/src/cvrp_bench/solver/rustvrp
          - scalar-variable/employee-scheduling/src/employee_scheduling_bench/solver/solverforge_nrp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout SolverForge path dependencies
        run: |
          rm -rf "$GITHUB_WORKSPACE/../solverforge"
          rm -rf "$GITHUB_WORKSPACE/../solverforge-node-sharing"
          git clone --depth 1 --branch v0.14.1 "${GITHUB_SERVER_URL:-https://github.com}/SolverForge/solverforge.git" "$GITHUB_WORKSPACE/../solverforge"
          git clone --depth 1 --branch feat/node-sharing-compiler "${GITHUB_SERVER_URL:-https://github.com}/SolverForge/solverforge.git" "$GITHUB_WORKSPACE/../solverforge-node-sharing"

      - name: Set up Python
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.14"

      - name: Set Python environment variables
        run: |
          echo "PYO3_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "PYTHON_SYS_EXECUTABLE=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        working-directory: ${{ matrix.crate }}
        run: cargo build --locked
